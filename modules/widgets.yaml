name: "小组件"
description: "所有小组件集合"

env_schema:
  TITLE:
    name: 倒计时标题
    description: 倒计时小组件显示的标题
    default_value: "目标日"
  DATE:
    name: 目标日期
    description: "目标日期，ISO 8601 格式"
    default_value: "2026-12-31T00:00:00+08:00"
  ICON:
    name: 图标
    description: SF Symbol 图标名
    default_value: "flag.checkered"
  COLOR_1:
    name: 渐变起始色
    description: 倒计时背景渐变起始色
    default_value: "#6366F1"
  COLOR_2:
    name: 渐变结束色
    description: 倒计时背景渐变结束色
    default_value: "#8B5CF6"
  TYPE:
    name: 一言类型
    description: "a=动画 b=漫画 c=游戏 d=文学 e=原创 f=网络 g=其他 h=影视 i=诗词 j=网易云 k=哲学，留空则不限"
    options:
      - ""
      - a
      - b
      - c
      - d
      - e
      - f
      - g
      - h
      - i
      - j
      - k
  CITY:
    name: 城市
    description: "天气小组件的城市名称（英文）"
    default_value: "London"

scriptings:
# 加密货币实时行情，支持多种 Widget 尺寸，无需配置环境变量
- generic:
    name: 加密货币行情
    script_url: https://raw.githubusercontent.com/egerndaddy/quick-start/main/modules/widget_crypto_price.js

# 倒计时小组件
- generic:
    name: 倒计时
    script_url: https://raw.githubusercontent.com/egerndaddy/quick-start/main/modules/countdown.js

# 一言（Hitokoto）小组件，每次刷新展示一条随机名言/语录
- generic:
    name: 一言
    script_url: https://raw.githubusercontent.com/egerndaddy/quick-start/main/modules/hitokoto.js

# 天气小组件，使用 Open-Meteo API，无需 API Key
- generic:
    name: 天气
    script_url: https://raw.githubusercontent.com/egerndaddy/quick-start/main/modules/weather.js

# 今日进度小组件，展示今天/本月/本年的时间进度，纯本地计算无需网络
- generic:
    name: 今日进度
    script_url: https://raw.githubusercontent.com/egerndaddy/quick-start/main/modules/daily-progress.js

widgets:
- name: 加密货币行情
  script_name: 加密货币行情
- name: 倒计时
  script_name: 倒计时
- name: 一言
  script_name: 一言
- name: 天气
  script_name: 天气
- name: 今日进度
  script_name: 今日进度
